services:

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: glovebox-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - glovebox-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: glovebox-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://mongodb:27017
    volumes:
      - ./backend:/app/backend
    networks:
      - glovebox-network

  mongodb:
    image: mongo:7
    container_name: glovebox-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - ./data/db:/data/db
    networks:
      - glovebox-network

networks:
  glovebox-network:
    driver: bridge
